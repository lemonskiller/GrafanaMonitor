global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nextoffer
    metrics_path: /actuator/prometheus
    honor_labels: true
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.json
        refresh_interval: 30s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
