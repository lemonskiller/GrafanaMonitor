services:
  prometheus:
    image: docker.m.daocloud.io/prom/prometheus:v3.12.0
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - default
      - nextoffer
    depends_on:
      - alertmanager
      - blackbox-exporter
      - ollama-monitor

  alertmanager:
    image: docker.m.daocloud.io/prom/alertmanager:v0.32.1
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_BIND_ADDRESS:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    secrets:
      - smtp_password

  blackbox-exporter:
    image: docker.m.daocloud.io/prom/blackbox-exporter:v0.28.0
    restart: unless-stopped
    ports:
      - "${BLACKBOX_BIND_ADDRESS:-127.0.0.1}:${BLACKBOX_PORT:-9115}:9115"
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro

  ollama-monitor:
    build:
      context: ./ollama-monitor
    restart: unless-stopped
    network_mode: host
    environment:
      OLLAMA_UPSTREAM_URL: ${OLLAMA_UPSTREAM_URL:-http://127.0.0.1:11433}
      OLLAMA_MONITOR_HOST: ${OLLAMA_MONITOR_HOST:-127.0.0.1}
      OLLAMA_MONITOR_PORT: ${OLLAMA_MONITOR_PORT:-11434}
      OLLAMA_METRICS_HOST: ${OLLAMA_METRICS_HOST:-172.17.0.1}
      OLLAMA_METRICS_PORT: ${OLLAMA_METRICS_PORT:-11435}
      OLLAMA_DEFAULT_CLIENT_SERVICE: ${OLLAMA_DEFAULT_CLIENT_SERVICE:-open-webui}
      OLLAMA_MODELS_CONFIG: /config/models.json
    volumes:
      - ./ollama-monitor/models.json:/config/models.json:ro

  node-exporter:
    image: docker.m.daocloud.io/prom/node-exporter:v1.11.1
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.systemd
      - --collector.processes
      - --collector.textfile.directory=/textfile
      - --web.listen-address=:9100
    ports:
      - "${NODE_EXPORTER_BIND_ADDRESS:-127.0.0.1}:${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /:/host:ro,rslave
      - /run/dbus:/run/dbus:ro
      - ./runtime/textfile:/textfile:ro

  cadvisor:
    image: ghcr.m.daocloud.io/google/cadvisor:v0.57.0
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "${CADVISOR_BIND_ADDRESS:-127.0.0.1}:${CADVISOR_PORT:-8080}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  grafana:
    image: docker.m.daocloud.io/grafana/grafana:13.1.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SERVE_FROM_SUB_PATH:-false}
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: ${GRAFANA_CSRF_TRUSTED_ORIGINS:-}
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - ollama-monitor

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  nextoffer:
    external: true
    name: nextoffer_default

secrets:
  grafana_admin_password:
    file: ${GRAFANA_ADMIN_PASSWORD_FILE:-./secrets/grafana-admin-password}
  smtp_password:
    file: ${SMTP_PASSWORD_FILE:-./secrets/smtp-password}
